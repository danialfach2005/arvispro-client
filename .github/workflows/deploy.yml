name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      # - name: Run Tests
      #   run: bun test

      - name: Build Project
        run: bun run build

  deploy:
    name: Deploy to VPS (Docker)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }} # Biasanya 22
          script: |
            # Pastikan path ini sesuai dengan lokasi clone repository di VPS Anda
            cd /path/to/arvispro-client
            
            # Ambil update terbaru dari branch main
            git checkout main
            git pull origin main
            
            # Rebuild image Docker & restart container (Idempotent & Zero-Downtime update dengan Docker Compose)
            docker compose up -d --build

  notify-on-failure:
    name: Notification on Failure
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        run: |
          echo "🚨 Deployment pipeline failed for Arvispro Client!"
          # Uncomment baris di bawah dan masukkan Webhook URL untuk mengirim notifikasi ke Discord/Slack
          # curl -H "Content-Type: application/json" -d '{"content": "🚨 [URGENT] Deploy Arvispro-client GAGAL. Cek GitHub Actions!"}' ${{ secrets.DISCORD_WEBHOOK }}
