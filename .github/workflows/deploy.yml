name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🔨 Build Project
        run: bun run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 🚀 Deploy to VPS (Docker)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Masuk ke direktori project
            cd /opt/arvispro-client || git clone https://github.com/danialfach2005/arvispro-client.git /opt/arvispro-client && cd /opt/arvispro-client
            
            # Pull repository terbaru
            git fetch origin main
            git reset --hard origin/main
            
            # Buat file .env dari GitHub Secrets (khusus environment variables)
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
            
            # Rebuild dan jalankan Docker Container
            docker compose up -d --build
            
            # Prune (Bersihkan) image docker yang tidak terpakai agar disk VPS tidak penuh
            docker image prune -f

      - name: ❌ Send Notification on Failure
        if: failure()
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: error
          details: "Deployment Arvispro Client ke VPS Gagal!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK_URL }}
