server {
    listen 80;
    listen [::]:80;
    server_name arvispro.com www.arvispro.com; # GANTI dengan domain atau IP Anda

    root /var/www/arvispro;
    index index.html;

    # Gzip Compression untuk performa
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Fallback ke index.html untuk React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache untuk file statis (JS, CSS, Image)
    location ~* \.(?:css|js|jpg|svg|png|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
